name: Build IVANNA-FUSION-PRO APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build APK (NDK + DSP)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        # FIX #23: NDK 27 LTS — mejoras de optimización ARM64 y fixes de Clang vs NDK 25
        run: |
          sdkmanager --install "ndk;27.2.12479018" "cmake;3.22.1"
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> $GITHUB_ENV

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Permisos gradlew
        run: chmod +x gradlew

      # FIX #22: lint antes de compilar para detectar errores estáticos
      - name: Lint
        run: ./gradlew lint --no-daemon

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # FIX #22: Release APK sin firma (para firma con secrets, agregar step de keystore)
      - name: Build Release APK (sin firma)
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: IVANNA-FUSION-PRO-DSP-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload Release APK (unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: IVANNA-FUSION-PRO-DSP-release-unsigned
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30

      - name: Info APK
        run: |
          echo "=== IVANNA-FUSION-PRO DSP APK ==="
          ls -lh app/build/outputs/apk/debug/ || true
          ls -lh app/build/outputs/apk/release/ || true
